<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AetherBrowser - AI Desktop Browser v2.0</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="index.css">
</head>
<body>
  <div class="app-container">
    <!-- Top Navigation Bar -->
    <header class="app-header">
      <div class="brand">
        <i class="fa-solid fa-atom brand-icon"></i>
        <span class="brand-title">AetherBrowser <small style="font-size: 0.65rem; color: var(--accent-cyan);">v2.0 Clean</small></span>
      </div>
      <div class="header-right">
        <button id="toggle-sidebar-btn" class="icon-btn" title="사이드바 열기/닫기">
          <i class="fa-solid fa-sidebar"></i>
        </button>
      </div>
    </header>

    <!-- Main Workspace Split Grid -->
    <main class="workspace-grid">
      <!-- Left Panel: AI Control Sidebar -->
      <aside class="ai-sidebar" id="ai-sidebar">
        <!-- Settings Panel -->
        <div class="glass-card collapsible collapsed" id="config-panel">
          <div class="card-header flex-header" id="toggle-config-btn" style="cursor: pointer;">
            <h3><i class="fa-solid fa-sliders"></i> AI CLI & API Settings</h3>
            <i class="fa-solid fa-chevron-down toggle-icon"></i>
          </div>
          <div class="card-body">
            <div class="input-group">
              <label for="cli-presets">CLI Presets / API Model</label>
              <select id="cli-presets">
                <option value="gemini-api" selected>Gemini API (Direct API - Recommended)</option>
                <option value="openai-api">OpenAI API (Direct GPT-4o-mini)</option>
                <option value="agy">Agy (Gemini CLI)</option>
                <option value="ollama run llama3">Ollama Llama3 (Local LLM)</option>
                <option value="custom">Custom Command / API Url...</option>
              </select>
            </div>
            
            <div class="input-group" style="margin-top: 8px; display: flex; align-items: center; gap: 8px;">
              <input type="checkbox" id="session-partition-toggle" style="width: auto; cursor: pointer;">
              <label for="session-partition-toggle" style="margin: 0; cursor: pointer; font-size: 0.8rem; font-weight: 600;">새 탭 생성 시 독립 계정(세션 분리) 사용</label>
            </div>
            
            <div class="input-group" id="api-key-group" style="margin-top: 8px;">
              <label for="api-key-input" id="api-key-label">Gemini API Key</label>
              <input type="password" id="api-key-input" placeholder="API Key 입력 (비어있으면 PC 환경변수 사용)">
            </div>
            
            <div class="input-group" style="margin-top: 8px;">
              <label for="cli-command-input">Command Template / API URL</label>
              <input type="text" id="cli-command-input" value="gemini-api">
            </div>
          </div>
        </div>

        <!-- AI Agent Automation Controller -->
        <div class="glass-card">
          <div class="card-header flex-header">
            <h3><i class="fa-solid fa-wand-magic-sparkles"></i> AI Agent Automation</h3>
            <button id="show-config-btn" class="icon-btn-sm" title="설정 열기">
              <i class="fa-solid fa-sliders"></i>
            </button>
          </div>
          <div class="card-body">
            <div class="input-group">
              <label for="goal-input">목표를 작성해 주세요</label>
              <textarea id="goal-input" rows="3" placeholder="예: 티스토리에 오늘 한국 주식시황 보고서 작성해줘."></textarea>
            </div>
            
            <div class="button-group">
              <button id="run-btn" class="btn btn-primary">
                <i class="fa-solid fa-play"></i> AI 자동화 시작
              </button>
              <button id="stop-btn" class="btn btn-danger" disabled>
                <i class="fa-solid fa-square"></i> 중지
              </button>
            </div>

            <div style="margin-top: 8px;">
              <button id="launch-chrome-btn" class="btn" style="width: 100%; background: linear-gradient(135deg, #1a73e8, #4285f4); color: white; font-weight: 600; padding: 8px 12px; border-radius: 6px; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px;" title="내 PC에 설치된 진짜 Chrome 150을 스텔스 구동하여 구글/티스토리/네이버 로그인을 진행합니다.">
                <i class="fa-brands fa-chrome"></i> 진짜 Chrome 150 스텔스 실행
              </button>
            </div>
          </div>
        </div>

        <!-- Timeline Log panel -->
        <div class="glass-card fill-remaining">
          <div class="card-header flex-header">
            <h3><i class="fa-solid fa-list-check"></i> Timeline Logs</h3>
            <button id="clear-logs-btn" class="text-btn">Clear Logs</button>
          </div>
          <div class="card-body log-container" id="timeline-logs">
            <div class="empty-state">
              <i class="fa-solid fa-terminal"></i>
              <p>목표를 실행하면 AI 에이전트의 작업 단계가 여기에 표시됩니다.</p>
            </div>
          </div>
        </div>

        <!-- Extracted Result panel -->
        <div class="glass-card">
          <div class="card-header">
            <h3><i class="fa-solid fa-square-poll-vertical"></i> Task Output</h3>
          </div>
          <div class="card-body log-container" id="extracted-result" style="max-height: 160px;">
            <div class="empty-state">
              <i class="fa-solid fa-box-open"></i>
              <p>최종 결과 및 추출된 정보가 표시됩니다.</p>
            </div>
          </div>
        </div>
      </aside>

      <!-- Right Panel: Browser Canvas Area -->
      <section class="browser-canvas">
        <!-- Tab Bar -->
        <div class="tab-bar-container">
          <div class="tabs-list" id="tabs-list">
            <!-- Tabs added dynamically -->
            <button id="add-tab-btn" class="icon-btn-sm" title="새 탭 추가">
              <i class="fa-solid fa-plus"></i>
            </button>
          </div>
          <div class="tab-controls-right">
            <button id="clear-cache-btn" class="icon-btn-sm" title="쿠키/캐시 초기화">
              <i class="fa-solid fa-broom"></i>
            </button>
          </div>
        </div>

        <!-- Address Bar & Controls -->
        <div class="address-bar-container">
          <div class="nav-buttons">
            <button id="browser-back" class="icon-btn-sm" title="뒤로가기">
              <i class="fa-solid fa-arrow-left"></i>
            </button>
            <button id="browser-forward" class="icon-btn-sm" title="앞으로가기">
              <i class="fa-solid fa-arrow-right"></i>
            </button>
            <button id="browser-refresh" class="icon-btn-sm" title="새로고침">
              <i class="fa-solid fa-rotate-right"></i>
            </button>
          </div>

          <div class="address-input-wrapper">
            <i class="fa-solid fa-lock lock-icon"></i>
            <input type="text" id="browser-address-bar" placeholder="URL 입력 또는 검색어 입력...">
          </div>
        </div>

        <!-- WebView Loader Indicator Bar -->
        <div id="webview-loader" class="webview-loader"></div>

        <!-- Dynamic WebView Workspace Container -->
        <div id="webview-container" class="webview-container"></div>
      </section>
    </main>
  </div>

  <script type="module" src="renderer.js"></script>
</body>
</html>
